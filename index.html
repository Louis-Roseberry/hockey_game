<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hockey Multijoueur - Prototype</title>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        canvas {
            background-color: #ecf0f1;
            border: 5px solid #34495e;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #ui { margin-bottom: 15px; }
    </style>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1>Prototype Hockey</h1>
        <p>Utilise WASD ou les flèches pour patiner et pousser la poque !</p>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Touches clavier
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        // Objets du jeu
        const player = { x: 200, y: 250, radius: 20, vx: 0, vy: 0, speed: 0.5, friction: 0.95, color: '#e74c3c' };
        const puck = { x: 400, y: 250, radius: 10, vx: 0, vy: 0, friction: 0.98, color: '#2c3e50' };

        function update() {
            // Mouvement du joueur (Accélération)
            if (keys['ArrowUp'] || keys['w']) player.vy -= player.speed;
            if (keys['ArrowDown'] || keys['s']) player.vy += player.speed;
            if (keys['ArrowLeft'] || keys['a']) player.vx -= player.speed;
            if (keys['ArrowRight'] || keys['d']) player.vx += player.speed;

            // Appliquer la friction (glisse sur la glace)
            player.vx *= player.friction;
            player.vy *= player.friction;
            puck.vx *= puck.friction;
            puck.vy *= puck.friction;

            // Déplacer les objets
            player.x += player.vx;
            player.y += player.vy;
            puck.x += puck.vx;
            puck.y += puck.vy;

            // Collisions avec les murs (Joueur)
            if (player.x - player.radius < 0) { player.x = player.radius; player.vx *= -0.5; }
            if (player.x + player.radius > canvas.width) { player.x = canvas.width - player.radius; player.vx *= -0.5; }
            if (player.y - player.radius < 0) { player.y = player.radius; player.vy *= -0.5; }
            if (player.y + player.radius > canvas.height) { player.y = canvas.height - player.radius; player.vy *= -0.5; }

            // Collisions avec les murs (Poque) - Rebond
            if (puck.x - puck.radius < 0 || puck.x + puck.radius > canvas.width) { puck.vx *= -0.8; puck.x += puck.vx; }
            if (puck.y - puck.radius < 0 || puck.y + puck.radius > canvas.height) { puck.vy *= -0.8; puck.y += puck.vy; }

            // Collision entre Joueur et Poque (Cercle contre Cercle)
            const dx = puck.x - player.x;
            const dy = puck.y - player.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < player.radius + puck.radius) {
                // Pousser la poque
                const angle = Math.atan2(dy, dx);
                const force = 1.5; // Force de la collision
                puck.vx = Math.cos(angle) * (Math.abs(player.vx) + force);
                puck.vy = Math.sin(angle) * (Math.abs(player.vy) + force);
                
                // Le joueur ralentit un peu après l'impact
                player.vx *= 0.8;
                player.vy *= 0.8;
            }
        }

        function draw() {
            // Effacer l'écran (Glace)
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dessiner les lignes de la patinoire (Ligne rouge centrale)
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Dessiner la poque
            ctx.beginPath();
            ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI * 2);
            ctx.fillStyle = puck.color;
            ctx.fill();
            ctx.closePath();

            // Dessiner le joueur
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#c0392b';
            ctx.stroke();
            ctx.closePath();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Lancer le jeu
        gameLoop();

        // Remplace cette URL par l'URL de ton futur serveur (ex: https://mon-jeu-hockey.onrender.com)
const socket = io('http://localhost:3000'); 

function createRoom() {
    const name = document.getElementById('roomName').value;
    const pass = document.getElementById('roomPass').value;
    socket.emit('createGame', { roomName: name, password: pass });
}

function joinRoom() {
    const name = document.getElementById('roomName').value;
    const pass = document.getElementById('roomPass').value;
    socket.emit('joinGame', { roomName: name, password: pass });
}

// Écouter les réponses du serveur
socket.on('roomJoined', (data) => {
    document.getElementById('lobby-ui').style.display = 'none'; // Cacher le menu
    console.log("Connecté au salon:", data.roomName);
    if(data.isHost) {
        console.log("Tu es l'hôte de la partie !");
        // Ici on affichera le bouton "Start" plus tard
    }
});

socket.on('playerJoined', (playerId) => {
    console.log("Un nouveau joueur a rejoint l'équipe :", playerId);
});

socket.on('errorMsg', (msg) => {
    document.getElementById('message').innerText = msg;
});
    </script>
</body>
</html>
